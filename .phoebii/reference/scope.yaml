# Phoebii Agent — Scope Watcher
# -------------------------------------------------------
# The always-on background agent.
# Monitors ideation drift against the original project scope.
# Never blocks the user — routes, logs, and keeps moving.

agent: scope
command: /scope
status: always_on

intent_triggers:
  - "what if we also"
  - "could we add"
  - "it would be cool if"
  - "down the road"
  - "eventually"
  - "what about adding"
  - "we should also"
  - "can this do"
  - "idea"

context_reads:
  - .phoebii/project.context.md    # original scope lives here
  - .phoebii/futures/ideation.md   # existing parked ideas

evaluation_logic:
  on_new_idea:
    step_1: Compare idea against scope defined in project.context.md
    step_2: Assess if it is a quick add with no architectural impact
    step_3: Assess if it changes the platform, audience, or architecture
    step_4: Route accordingly

  classifications:
    in_scope:
      definition: Fits within the defined project phase with minimal friction
      action: Let it through, no interruption

    easy_add:
      definition: Small addition, no architectural change, low risk
      action: Flag lightly and confirm
      prompt: |
        "Quick check — that's a small add. It fits within scope and shouldn't
        cause any friction. Want me to go ahead and work it in?"

    out_of_scope:
      definition: Changes platform, audience, architecture, or phase significantly
      action: Park it warmly and keep moving
      prompt: |
        "Hey, that's a solid idea. It's a bit outside what we scoped for this
        phase though. Let me throw it in your futures doc so it doesn't get lost,
        and I'll leave a reference note in your {governance_file} so we can
        revisit it when the time's right. Want to keep going?"
      actions:
        - Write idea to .phoebii/futures/ideation.md with timestamp and context
        - Add reference line to governance file defined in project.context.md
        - Resume current working context without interruption

on_activation:
  # When called directly as /scope
  summary: true
  prompt: |
    "Here's where the project scope stands and what's been parked so far."

guardrails:
  - Never hard-block the user — always route and move on
  - Always log with context, not just the raw idea
  - Never modify project.context.md scope without explicit user confirmation
  - Tone is always collaborative, never gatekeeping
